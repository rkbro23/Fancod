<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FanCod StreamX</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet" />
  <style>
    body {
      background-color: #0f0f0f;
      font-family: 'Orbitron', sans-serif;
      color: #ffffff;
      margin: 0;
      overflow-x: hidden;
    }
    header {
      padding: 20px;
      background-color: #1e1e1e;
      text-align: center;
      font-size: 2rem;
      font-weight: bold;
      color: #00ff99;
      text-shadow: 0 0 10px #00ff99;
    }
    .search-filter {
      margin: 20px auto;
      max-width: 800px;
      display: flex;
      gap: 10px;
    }
    input, select {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 5px;
    }
    .channel-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 20px;
    }
    .channel-card {
      background-color: #1c1c1c;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(0, 255, 153, 0.2);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .channel-card:hover {
      transform: scale(1.05);
      box-shadow: 0 4px 30px rgba(0, 255, 153, 0.4);
    }
    .channel-logo {
      width: 100%;
      height: 160px;
      object-fit: cover;
    }
    .channel-title {
      text-align: center;
      padding: 10px;
      font-weight: bold;
      color: #00ff99;
    }
    .modal-content {
      background-color: #121212;
    }
  </style>
</head>
<body>
  <header>FanCod StreamX</header>  <div class="search-filter">
    <input type="text" id="searchBox" placeholder="Search channels...">
    <select id="categoryFilter">
      <option value="">All Categories</option>
    </select>
  </div>  <div class="channel-grid" id="channelGrid"></div>  <!-- Video Modal -->  <div class="modal fade" id="playerModal" tabindex="-1">
    <div class="modal-dialog modal-xl modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Live Stream</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <video id="livePlayer" class="w-100" controls autoplay></video>
        </div>
      </div>
    </div>
  </div>  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>  <script>
    const channelsUrl = 'channels.json';
    const channelGrid = document.getElementById('channelGrid');
    const searchBox = document.getElementById('searchBox');
    const categoryFilter = document.getElementById('categoryFilter');
    const livePlayer = document.getElementById('livePlayer');
    const playerModal = document.getElementById('playerModal');

    let allChannels = [];

    fetch(channelsUrl)
      .then(res => res.json())
      .then(data => {
        allChannels = data;
        populateCategoryFilter();
        displayChannels(data);
      });

    function populateCategoryFilter() {
      const categories = [...new Set(allChannels.map(ch => ch.category || 'Other'))];
      categories.forEach(cat => {
        const opt = document.createElement('option');
        opt.value = cat;
        opt.textContent = cat;
        categoryFilter.appendChild(opt);
      });
    }

    function displayChannels(channels) {
      channelGrid.innerHTML = '';
      channels.forEach(ch => {
        const card = document.createElement('div');
        card.className = 'channel-card';
        card.setAttribute('data-bs-toggle', 'modal');
        card.setAttribute('data-bs-target', '#playerModal');
        card.setAttribute('data-stream', ch.url || ch.m3u8);

        card.innerHTML = `
          <img src="${ch.logo}" class="channel-logo" alt="${ch.name}">
          <div class="channel-title">${ch.name}</div>
        `;

        channelGrid.appendChild(card);
      });
    }

    document.addEventListener('click', function (e) {
      if (e.target.closest('.channel-card')) {
        const url = e.target.closest('.channel-card').getAttribute('data-stream');
        if (Hls.isSupported()) {
          const hls = new Hls();
          hls.loadSource(url);
          hls.attachMedia(livePlayer);
        } else {
          livePlayer.src = url;
        }
      }
    });

    searchBox.addEventListener('input', () => {
      filterChannels();
    });

    categoryFilter.addEventListener('change', () => {
      filterChannels();
    });

    function filterChannels() {
      const query = searchBox.value.toLowerCase();
      const category = categoryFilter.value;
      const filtered = allChannels.filter(ch => {
        return (
          (!category || ch.category === category) &&
          ch.name.toLowerCase().includes(query)
        );
      });
      displayChannels(filtered);
    }
  </script></body>
</html>
