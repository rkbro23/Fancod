<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FanCod LIVE Channels</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #0e0e0e;
      color: #fff;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: #00ff8c;
      margin-bottom: 30px;
      font-size: 2em;
    }

    .channel-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    .channel-card {
      background: #161616;
      border-radius: 12px;
      padding: 14px;
      position: relative;
      transition: 0.3s ease;
      cursor: pointer;
      box-shadow: 0 0 12px rgba(0, 255, 140, 0.1);
      text-align: center;
    }

    .channel-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 0 18px #00ffc3;
    }

    .channel-logo {
      width: 100%;
      height: 160px;
      border-radius: 10px;
      object-fit: cover;
      background: #000;
      box-shadow: 0 0 6px rgba(0,255,140,0.4);
      margin-bottom: 10px;
    }

    .channel-title {
      font-size: 1rem;
      font-weight: bold;
      color: #ffffff;
    }

    .live-badge {
      position: absolute;
      top: 12px;
      left: 12px;
      background-color: #ff0033;
      padding: 4px 10px;
      border-radius: 8px;
      font-size: 0.75rem;
      font-weight: bold;
      animation: blink 1s infinite, glow 2s infinite;
      box-shadow: 0 0 12px #ff0033;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    @keyframes glow {
      0%, 100% { box-shadow: 0 0 8px #ff0033; }
      50% { box-shadow: 0 0 24px #ff0033; }
    }

    #player {
      margin-top: 40px;
      display: none;
    }

    video {
      width: 100%;
      max-width: 960px;
      height: 500px;
      margin: 0 auto;
      display: block;
      background: #000;
      border-radius: 16px;
    }
  </style>
</head>
<body>

  <h1>🔴 FanCod LIVE Channels</h1>
  <div class="channel-list" id="channelList"></div>

  <div id="player">
    <video id="videoPlayer" controls autoplay>
      <source src="" type="application/x-mpegURL">
      Your browser does not support M3U8 playback.
    </video>
  </div>

  <script>
    async function loadChannels() {
      const res = await fetch('channels.json');
      const channels = await res.json();
      const container = document.getElementById('channelList');

      channels.forEach(channel => {
        const card = document.createElement('div');
        card.className = 'channel-card';

        const logo = channel.attributes?.['tvg-logo'] || '';
        const name = channel.name || 'Unknown Match';
        const url = channel.url;

        card.innerHTML = `
          <div class="live-badge">LIVE</div>
          <img src="${logo}" alt="${name}" class="channel-logo" onerror="this.src='https://via.placeholder.com/320x160/000000/ffffff?text=No+Image';">
          <div class="channel-title">${name}</div>
        `;

        card.onclick = () => {
          const player = document.getElementById("player");
          const video = document.getElementById("videoPlayer");
          video.src = url;
          player.style.display = "block";
          window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
        };

        container.appendChild(card);
      });
    }

    loadChannels();
  </script>

</body>
</html>
