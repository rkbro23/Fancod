<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FanCod Live - Proxy Player</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #0f0f0f;
      color: white;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      font-size: 2rem;
      color: #00ff8c;
      margin-bottom: 30px;
    }

    .channel-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px;
    }

    .channel-card {
      background: #1a1a1a;
      padding: 12px;
      border-radius: 12px;
      text-align: center;
      position: relative;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 0 10px rgba(0, 255, 150, 0.15);
    }

    .channel-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 0 16px #00ffc3;
    }

    .channel-logo {
      width: 100%;
      height: 140px;
      object-fit: cover;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    .channel-title {
      font-weight: bold;
      font-size: 1rem;
    }

    .live-badge {
      position: absolute;
      top: 10px;
      left: 10px;
      background: #ff0033;
      color: #fff;
      padding: 4px 10px;
      font-size: 0.75rem;
      font-weight: bold;
      border-radius: 8px;
      animation: blink 1.2s infinite, glow 2s infinite;
      box-shadow: 0 0 10px #ff0033;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    @keyframes glow {
      0%, 100% { box-shadow: 0 0 10px #ff0033; }
      50% { box-shadow: 0 0 25px #ff0033; }
    }

    #player-container {
      margin-top: 40px;
      display: none;
      max-width: 960px;
      margin-left: auto;
      margin-right: auto;
    }

    video {
      width: 100%;
      height: auto;
      max-height: 500px;
      border-radius: 16px;
      background: #000;
    }

    #loading {
      color: #00ff8c;
      text-align: center;
      margin-bottom: 10px;
    }

    @media (max-width: 600px) {
      .channel-logo { height: 100px; }
      video { max-height: 300px; }
    }
  </style>
</head>
<body>
  <h1>🔴 FanCod LIVE Channels (PHP Proxy)</h1>
  <div class="channel-list" id="channelList"></div>

  <div id="player-container">
    <div id="loading">Loading stream...</div>
    <video id="videoPlayer" controls autoplay></video>
  </div>

  <script>
    async function loadChannels() {
      try {
        const res = await fetch("channels.json");
        const data = await res.json();
        const container = document.getElementById("channelList");

        data.forEach(channel => {
          const card = document.createElement("div");
          card.className = "channel-card";

          const logo = channel.attributes?.["tvg-logo"] || "";
          const name = channel.name || "Untitled";
          const rawUrl = channel.url;

          card.innerHTML = `
            <div class="live-badge">LIVE</div>
            <img src="${logo}" alt="${name}" class="channel-logo"
              onerror="this.src='https://via.placeholder.com/300x140?text=No+Logo'">
            <div class="channel-title">${name}</div>
          `;

          card.onclick = () => playStream(rawUrl);
          container.appendChild(card);
        });
      } catch (err) {
        alert("Failed to load channels.json: " + err.message);
      }
    }

    function playStream(originalUrl) {
  const proxyUrl = `https://proxyphp.free.nf/proxy.php?url=${encodeURIComponent(originalUrl)}`;
  const video = document.getElementById("videoPlayer");
  const loading = document.getElementById("loading");
  const playerContainer = document.getElementById("player-container");

  playerContainer.style.display = "block";
  loading.style.display = "block";
  video.pause();
  video.src = "";

  if (Hls.isSupported()) {
    const hls = new Hls();
    hls.loadSource(proxyUrl);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, () => {
      video.play().catch(console.error);
      loading.style.display = "none";
    });
    hls.on(Hls.Events.ERROR, (e, data) => {
      console.error("HLS.js error", data);
      alert("Stream error: " + data.details);
      loading.style.display = "none";
    });
  } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = proxyUrl;
    video.addEventListener('loadedmetadata', () => {
      video.play();
      loading.style.display = "none";
    });
  } else {
    loading.style.display = "none";
    alert("Your browser does not support HLS streaming.");
  }

  window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
    }

    loadChannels();
  </script>
</body>
</html>
